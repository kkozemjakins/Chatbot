<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Psychological Support Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Konkhmer+Sleokchher&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Konkhmer Sleokchher', system-ui;
            background: radial-gradient(circle at top left, #fdfcfd 0%, #e0e0ff 40%, #d8ccf0 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
            box-sizing: border-box;
        }

        button {
            background: #cbbceb;
            color: #2c2451;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

            button:hover {
                background: #b5a3e0;
            }

        .hidden {
            display: none;
        }

        #status {
            color: green;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container" id="loginView">
        <h2>Admin Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <p id="loginError" style="color:red; font-size: 12px;" class="hidden">Invalid credentials.</p>
    </div>

    <div class="container hidden" id="adminView">
        <h2>Edit AI Prompt</h2>
        <p style="font-size: 12px; color: #666;">Define the system instruction for the Gemini AI.</p>
        <textarea id="promptText" rows="6"></textarea>
        <button onclick="savePrompt()">Save Prompt</button>
        <p id="status"></p>
        <button onclick="logout()" style="margin-top: 15px; background: #e0e0e0;">Logout</button>
    </div>

    <script src="admin.js"></script>
</body>
</html>
