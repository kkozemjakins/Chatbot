<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Psychological Support Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Konkhmer+Sleokchher&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Konkhmer Sleokchher', system-ui;
            margin: 0;
            padding: 0;
            /* Radial gradient background matching the image */
            background: radial-gradient(circle at top left, #fdfcfd 0%, #e0e0ff 40%, #d8ccf0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .PageWrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Top Branding */
        .brand {
            align-self: flex-start;
            font-size: 14px;
            color: #2c2451;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
        }

            .brand::before {
                content: "●";
                margin-right: 5px;
                font-size: 10px;
            }

        /* Hero Header */
        #hero-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #2c2451;
            font-size: 42px;
            letter-spacing: 2px;
            margin: 0;
        }

        p.subtitle {
            color: #2c2451;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Main Chat Container (Glassmorphism) */
        .ChatWrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }

        /* Chat Messages Area */
        #chatBox {
            flex-grow: 1;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

            /* Custom Scrollbar */
            #chatBox::-webkit-scrollbar {
                width: 5px;
            }

            #chatBox::-webkit-scrollbar-thumb {
                background: #cbbceb;
                border-radius: 10px;
            }

        /* Bubble Styles */
        .message-row {
            display: flex;
            width: 100%;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            color: #4a4a6a;
            font-size: 14px;
            position: relative;
        }

        /* Icons */
        .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e6e0f8;
            margin: 0 10px;
        }

        /* Input Area matching the big white box */
        .input-container {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #dcdcdc;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
        }

        #messageInput {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            color: #555;
            resize: none;
        }

            #messageInput::placeholder {
                color: #b0b0b0;
                text-transform: uppercase;
                font-size: 12px;
            }

        /* Send Button - Purple Circle with Up Arrow */
        .send-btn {
            background: #cbbceb;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

            .send-btn:hover {
                background: #b5a3e0;
            }

            .send-btn svg {
                fill: white;
                width: 18px;
            }

        /* Utility */
        .hidden {
            display: none !important;
        }

        .emotion-tag {
            display: block;
            font-size: 11px;
            font-style: italic;
            margin-top: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="PageWrapper">
        <div class="brand">chat psychology</div>

        <div id="hero-section">
            <h1>HOW ARE YOU FEELING TODAY</h1>
            <p class="subtitle">Take a moment to check in with yourself and share your thoughts.</p>
        </div>

        <div class="ChatWrapper">
            <div id="chatBox" class="hidden"></div>

            <div class="input-container">
                <textarea id="messageInput" placeholder="Please leave your message here." rows="3"></textarea>
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
