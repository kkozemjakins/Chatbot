<!DOCTYPE html>
<html>
<head>
    <title>AI Psychological Support Chat</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
        }

        #chatBox {
            width: 500px;
            height: 400px;
            border: 1px solid #ccc;
            background: white;
            overflow-y: auto;
            padding: 10px;
        }

        #messageInput {
            width: 400px;
            padding: 8px;
        }

        button {
            padding: 8px;
        }

        .user {
            color: blue;
        }

        .bot {
            color: green;
        }
    </style>
</head>

<body>

    <h2>Psychological Support Chatbot</h2>

    <div id="chatBox"></div>

    <br>

    <input id="messageInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>

    <script src="chat.js"></script>

</body>
</html>
