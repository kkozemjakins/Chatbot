<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Psychological Support Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Konkhmer+Sleokchher&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Konkhmer Sleokchher', system-ui;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top left, #fdfcfd 0%, #e0e0ff 40%, #d8ccf0 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .PageWrapper {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Top Branding */
        .brand {
            align-self: flex-start;
            font-size: 14px;
            color: #2c2451;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
        }

            .brand::before {
                content: "●";
                margin-right: 5px;
                font-size: 10px;
            }

        /* Hero Header */
        #hero-section {
            text-align: center;
            margin-bottom: 40px;
            max-height: 200px;
            opacity: 1;
            overflow: hidden;
            transition: max-height 0.6s cubic-bezier(0.4, 0, 0.2, 1), margin-bottom 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease-out;
        }

            #hero-section.hidden-smooth {
                max-height: 0;
                margin-bottom: 0;
                opacity: 0;
            }

        h1 {
            color: #2c2451;
            font-size: 42px;
            letter-spacing: 2px;
            margin: 0;
        }

        p.subtitle {
            color: #2c2451;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Main Chat Container */
        .ChatWrapper {
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            padding: 40px;
            display: flex;
            flex-direction: column;
            min-height: 300px;
        }

        /* Chat Area */
        #chatBox {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            opacity: 0;
            transition: opacity 0.6s ease-in-out 0.2s;
            padding: 20px;
        }

            #chatBox::-webkit-scrollbar {
                width: 5px;
            }

            #chatBox::-webkit-scrollbar-thumb {
                background: #cbbceb;
                border-radius: 10px;
            }

        /* Bubble Styles */
        .message-row {
            display: flex;
            width: 100%;
        }

        .user-row {
            justify-content: flex-end;
        }

        .bot-row {
            justify-content: flex-start;
        }

        .bubble {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            color: #4a4a6a;
            font-size: 14px;
            position: relative;
        }

        /* Icons */
        .icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e6e0f8;
            margin: 0 10px;
        }

        /* Input Area  */
        .input-container {
            position: relative;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #dcdcdc;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
        }

        #messageInput {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            color: #555;
            resize: none;
        }

            #messageInput::placeholder {
                color: #b0b0b0;
                text-transform: uppercase;
                font-size: 12px;
            }

        /* Send Button  */
        .send-btn {
            background: #cbbceb;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

            .send-btn:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }

            .send-btn:hover {
                background: #b5a3e0;
            }

            .send-btn svg {
                fill: white;
                width: 18px;
            }

        /* Utility */
        .hidden {
            display: none !important;
        }

        /* Typing animation */
        .typing {
            display: flex;
            gap: 5px;
        }

            .typing span {
                width: 6px;
                height: 6px;
                background: #888;
                border-radius: 50%;
                animation: typing 1.2s infinite;
            }

                .typing span:nth-child(2) {
                    animation-delay: 0.2s;
                }

                .typing span:nth-child(3) {
                    animation-delay: 0.4s;
                }

        @keyframes typing {
            0%, 80%, 100% {
                opacity: 0;
            }

            40% {
                opacity: 1;
            }
        }

        .ChatWrapper.transition {
            animation: expandChat 0.6s ease forwards;
        }

        @keyframes expandChat {
            0% {
                transform: scale(0.95);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        #chatBox.show {
            opacity: 1;
        }

        /* Suggestion Chips */
        .chip-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            transition: opacity 0.4s ease, max-height 0.4s ease;
            overflow: hidden;
        }

        .chip {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid #cbbceb;
            color: #2c2451;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

            .chip:hover {
                background: #cbbceb;
                transform: translateY(-2px);
            }

        .chip-container.hidden-chips {
            opacity: 0;
            max-height: 0;
            margin-bottom: 0;
            pointer-events: none;
        }

        /* --- NEW MODAL STYLES --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 90%;
        }

            .modal-content h2 {
                color: #2c2451;
                margin-top: 0;
            }

            .modal-content p {
                color: #4a4a6a;
                font-size: 14px;
                margin-bottom: 30px;
            }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

            .modal-buttons button {
                padding: 10px 20px;
                border: none;
                border-radius: 10px;
                cursor: pointer;
                font-family: inherit;
                font-size: 14px;
                font-weight: bold;
                transition: background 0.3s;
            }

        .btn-new {
            background: #f0f0f5;
            color: #4a4a6a;
        }

            .btn-new:hover {
                background: #e1e1e8;
            }

        .btn-continue {
            background: #cbbceb;
            color: white;
        }

            .btn-continue:hover {
                background: #b5a3e0;
            }
    </style>
    <script src="chat.js" defer></script>
</head>
<body>

    <div id="sessionModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Welcome Back</h2>
            <p>Would you like to continue your previous conversation or start a fresh one?</p>
            <div class="modal-buttons">
                <button class="btn-new" onclick="window.startNewSession()">Start New</button>
                <button class="btn-continue" onclick="window.continueSession()">Continue</button>
            </div>
        </div>
    </div>

    <div class="PageWrapper">
        <div class="brand">chat psychology</div>

        <div id="hero-section">
            <h1>HOW ARE YOU FEELING TODAY</h1>
            <p class="subtitle">Take a moment to check in with yourself and share your thoughts.</p>
        </div>

        <div class="ChatWrapper">
            <div id="chatBox" class="hidden"></div>

            <div id="suggestion-chips" class="chip-container">
                <div class="chip" onclick="useChip('I feel a bit overwhelmed today')">I feel overwhelmed</div>
                <div class="chip" onclick="useChip('I need help with my sleep')">Can't sleep</div>
                <div class="chip" onclick="useChip('I just need someone to listen')">I need to vent</div>
                <div class="chip" onclick="useChip('I want to practice a relaxation exercise')">Relaxation help</div>
            </div>

            <div class="input-container">
                <textarea id="messageInput" placeholder="Please leave your message here." rows="3"></textarea>
                <button id="sendBtn" class="send-btn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z" /></svg>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
